<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CANCRI | 55 Cancri e Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              crystal: {
                idle: '#a5f3fc',     // Cyan-200
                thinking: '#d8b4fe', // Purple-300
                reflecting: '#fbbf24', // Amber-400
                evolving: '#f43f5e', // Rose-500
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Loading indicator */
      #loading-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-family: Inter, sans-serif;
        z-index: 9999;
      }
    </style>
    <div id="loading-indicator">加载中...</div>
    <script>
      // Remove loading indicator when app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('loading-indicator');
          if (loader) loader.remove();
        }, 1000);
      });
    </script>
  
<link rel="stylesheet" href="./index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
