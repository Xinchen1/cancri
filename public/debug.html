<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Page</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #050505;
      color: white;
      font-family: monospace;
      font-size: 14px;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 5px;
      border-left: 3px solid #a855f7;
    }
    .success { color: #22d3ee; }
    .error { color: #f43f5e; }
    .warning { color: #fbbf24; }
    pre {
      background: #0a0a0a;
      padding: 10px;
      border-radius: 5px;
      overflow: auto;
      font-size: 12px;
    }
    button {
      padding: 10px 20px;
      background: #7e22ce;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h1>🔍 CANCRI 调试页面</h1>
  
  <div class="section">
    <h2>1. 页面信息</h2>
    <p><strong>URL:</strong> <span id="url"></span></p>
    <p><strong>Pathname:</strong> <span id="pathname"></span></p>
    <p><strong>Origin:</strong> <span id="origin"></span></p>
  </div>
  
  <div class="section">
    <h2>2. DOM 检查</h2>
    <p><strong>Root Element:</strong> <span id="root-check"></span></p>
    <p><strong>Root Children:</strong> <span id="root-children"></span></p>
    <p><strong>Body Children:</strong> <span id="body-children"></span></p>
  </div>
  
  <div class="section">
    <h2>3. 资源检查</h2>
    <p><strong>Scripts:</strong> <span id="scripts-count"></span></p>
    <div id="scripts-list"></div>
    <p><strong>Stylesheets:</strong> <span id="styles-count"></span></p>
    <div id="styles-list"></div>
  </div>
  
  <div class="section">
    <h2>4. 环境变量</h2>
    <div id="env-info"></div>
  </div>
  
  <div class="section">
    <h2>5. 错误日志</h2>
    <div id="errors-list"></div>
  </div>
  
  <div class="section">
    <h2>6. 测试加载主应用</h2>
    <button onclick="loadApp()">加载主应用</button>
    <button onclick="location.reload()">刷新页面</button>
    <div id="app-status"></div>
  </div>
  
  <script>
    const errors = [];
    
    window.addEventListener('error', (e) => {
      errors.push({
        type: 'error',
        message: e.message,
        filename: e.filename,
        lineno: e.lineno,
        colno: e.colno,
        error: e.error?.stack
      });
      updateErrors();
    });
    
    window.addEventListener('unhandledrejection', (e) => {
      errors.push({
        type: 'promise',
        reason: String(e.reason),
        stack: e.reason?.stack
      });
      updateErrors();
    });
    
    function updateErrors() {
      const el = document.getElementById('errors-list');
      if (errors.length === 0) {
        el.innerHTML = '<p class="success">✅ 无错误</p>';
      } else {
        el.innerHTML = `<p class="error">❌ ${errors.length} 个错误</p><pre>${JSON.stringify(errors, null, 2)}</pre>`;
      }
    }
    
    // 页面信息
    document.getElementById('url').textContent = window.location.href;
    document.getElementById('pathname').textContent = window.location.pathname;
    document.getElementById('origin').textContent = window.location.origin;
    
    // DOM 检查
    const root = document.getElementById('root');
    if (root) {
      document.getElementById('root-check').innerHTML = '<span class="success">✅ 找到</span>';
      document.getElementById('root-children').textContent = root.children.length;
    } else {
      document.getElementById('root-check').innerHTML = '<span class="error">❌ 未找到</span>';
    }
    document.getElementById('body-children').textContent = document.body.children.length;
    
    // 资源检查
    const scripts = document.querySelectorAll('script[type="module"]');
    document.getElementById('scripts-count').textContent = scripts.length;
    const scriptsList = document.createElement('div');
    scripts.forEach((s, i) => {
      const div = document.createElement('div');
      div.style.marginTop = '5px';
      div.innerHTML = `${i + 1}. <code>${s.src || 'inline'}</code>`;
      scriptsList.appendChild(div);
    });
    document.getElementById('scripts-list').appendChild(scriptsList);
    
    const styles = document.querySelectorAll('link[rel="stylesheet"]');
    document.getElementById('styles-count').textContent = styles.length;
    const stylesList = document.createElement('div');
    styles.forEach((s, i) => {
      const div = document.createElement('div');
      div.style.marginTop = '5px';
      div.innerHTML = `${i + 1}. <code>${s.href}</code>`;
      stylesList.appendChild(div);
    });
    document.getElementById('styles-list').appendChild(stylesList);
    
    // 环境变量（注意：在非模块脚本中无法使用 import.meta）
    try {
      const envInfo = document.createElement('pre');
      envInfo.textContent = JSON.stringify({
        note: '环境变量在构建时注入，运行时无法直接访问',
        suggestion: '检查构建时的环境变量配置',
        currentURL: window.location.href,
        basePath: window.location.pathname.split('/').slice(0, -1).join('/') || '/'
      }, null, 2);
      document.getElementById('env-info').appendChild(envInfo);
    } catch (e) {
      document.getElementById('env-info').innerHTML = `<p class="error">无法读取环境变量: ${e.message}</p>`;
    }
    
    updateErrors();
    
    // 测试加载主应用（定义在全局作用域）
    window.loadApp = async function() {
      const statusEl = document.getElementById('app-status');
      statusEl.innerHTML = '<p class="warning">⏳ 正在检查主应用...</p>';
      
      try {
        // 检查主页面是否存在
        const basePath = window.location.pathname.split('/').slice(0, -1).join('/') || '/cancri';
        const mainPageUrl = basePath + '/index.html';
        const mainPageRoot = basePath + '/';
        
        statusEl.innerHTML = `<p>检查主页面:</p><ul style="margin: 10px 0; padding-left: 20px;"><li><code>${mainPageUrl}</code></li><li><code>${mainPageRoot}</code></li></ul>`;
        
        // 尝试访问主页面
        Promise.all([
          fetch(mainPageUrl).catch(() => ({ ok: false, status: 'error' })),
          fetch(mainPageRoot).catch(() => ({ ok: false, status: 'error' }))
        ]).then(([res1, res2]) => {
          if (res1.ok || res2.ok) {
            statusEl.innerHTML += '<p class="success">✅ 主页面存在</p>';
            statusEl.innerHTML += `<p><a href="${mainPageRoot}" style="color: #22d3ee; text-decoration: underline;">点击访问主页面</a></p>`;
            
            // 获取主页面内容并检查资源
            fetch(res1.ok ? mainPageUrl : mainPageRoot)
              .then(r => r.text())
              .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const scripts = doc.querySelectorAll('script[type="module"]');
                const styles = doc.querySelectorAll('link[rel="stylesheet"]');
                
                statusEl.innerHTML += `<p>主页面资源:</p><ul style="margin: 10px 0; padding-left: 20px;"><li>脚本: ${scripts.length} 个</li><li>样式表: ${styles.length} 个</li></ul>`;
                
                // 检查每个脚本是否可访问
                scripts.forEach((script, i) => {
                  if (script.src) {
                    const scriptUrl = script.src.startsWith('http') ? script.src : window.location.origin + script.src;
                    fetch(scriptUrl, { method: 'HEAD' })
                      .then(res => {
                        if (res.ok) {
                          statusEl.innerHTML += `<p class="success">✅ 脚本 ${i + 1} 可访问: <code style="font-size: 11px;">${script.src}</code></p>`;
                        } else {
                          statusEl.innerHTML += `<p class="error">❌ 脚本 ${i + 1} 返回 ${res.status}: <code style="font-size: 11px;">${script.src}</code></p>`;
                        }
                      })
                      .catch(e => {
                        statusEl.innerHTML += `<p class="error">❌ 脚本 ${i + 1} 无法访问: <code style="font-size: 11px;">${script.src}</code> - ${e.message}</p>`;
                      });
                  }
                });
                
                // 检查样式表
                styles.forEach((style, i) => {
                  if (style.href) {
                    const styleUrl = style.href.startsWith('http') ? style.href : window.location.origin + style.href;
                    fetch(styleUrl, { method: 'HEAD' })
                      .then(res => {
                        if (res.ok) {
                          statusEl.innerHTML += `<p class="success">✅ 样式表 ${i + 1} 可访问: <code style="font-size: 11px;">${style.href}</code></p>`;
                        } else {
                          statusEl.innerHTML += `<p class="error">❌ 样式表 ${i + 1} 返回 ${res.status}: <code style="font-size: 11px;">${style.href}</code></p>`;
                        }
                      })
                      .catch(e => {
                        statusEl.innerHTML += `<p class="error">❌ 样式表 ${i + 1} 无法访问: <code style="font-size: 11px;">${style.href}</code> - ${e.message}</p>`;
                      });
                  }
                });
              })
              .catch(e => {
                statusEl.innerHTML += `<p class="error">❌ 无法解析主页面: ${e.message}</p>`;
              });
          } else {
            statusEl.innerHTML += `<p class="error">❌ 主页面不存在 (${res1.status || 'error'})</p>`;
            statusEl.innerHTML += `<p>请检查 GitHub Pages 部署是否成功</p>`;
          }
        });
      } catch (e) {
        statusEl.innerHTML = `<p class="error">❌ 检查失败: ${e.message}</p>`;
        console.error('loadApp error:', e);
      }
    };
    
    // 自动检查资源加载状态
    setTimeout(() => {
      const scripts = document.querySelectorAll('script[type="module"]');
      scripts.forEach(script => {
        if (script.src) {
          fetch(script.src, { method: 'HEAD' })
            .then(res => {
              if (!res.ok) {
                console.error(`Script failed to load: ${script.src} - ${res.status}`);
              }
            })
            .catch(e => {
              console.error(`Script fetch error: ${script.src}`, e);
            });
        }
      });
    }, 1000);
  </script>
</body>
</html>
